version: '3.8'

services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mywebapp
      MYSQL_USER: app_user
      MYSQL_PASSWORD: 12345678
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lab_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
    environment:
      - DB_HOST=db
      - DB_USER=app_user
      - DB_PASS=12345678
      - DB_NAME=mywebapp
    networks:
      - lab_net
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python migrate.py --db-host=db --db-user=app_user --db-pass=12345678 --db-name=mywebapp &&
             gunicorn -b 0.0.0.0:8000 main:app"

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx_docker.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    networks:
      - lab_net
    depends_on:
      - app

networks:
  lab_net:

volumes:
  db_data: